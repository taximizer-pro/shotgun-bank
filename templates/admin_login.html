<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shotgun Bank — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
  html,body { height:100%; background:#0a2218; }
  body { display:flex; flex-direction:column; min-height:100vh; }
  .top-section {
    flex:1; background:#0a2218;
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start; padding:52px 28px 32px;
  }
  .logo-wrap { display:flex; align-items:center; gap:12px; margin-bottom:48px; }
  .logo-img { width:44px; height:44px; object-fit:contain; }
  .logo-text { color:#fff; font-size:20px; font-weight:700; letter-spacing:1px; }
  .admin-badge {
    background:rgba(234,179,8,0.15);
    border:1px solid rgba(234,179,8,0.4);
    color:#fbbf24;
    font-size:11px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; padding:4px 12px; border-radius:20px;
    margin-bottom:36px;
  }
  .greeting { color:rgba(255,255,255,0.6); font-size:28px; font-weight:300; margin-bottom:36px; text-align:center; }
  .field-wrap { width:100%; max-width:400px; margin-bottom:14px; position:relative; }
  .field-wrap label {
    position:absolute; top:-9px; left:14px; background:#0a2218;
    padding:0 4px; color:rgba(255,255,255,0.55); font-size:12px; font-weight:500; letter-spacing:0.4px; pointer-events:none;
  }
  .field-wrap input {
    width:100%; padding:16px 48px 16px 16px; background:transparent;
    border:1.5px solid rgba(255,255,255,0.3); border-radius:6px; color:#fff;
    font-size:16px; outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .field-wrap input::placeholder { color:transparent; }
  .field-wrap input:focus { border-color:#eab308; }
  .eye-btn {
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.5); font-size:18px; padding:4px;
  }
  .btn-main {
    width:100%; max-width:400px; padding:17px; margin-top:8px;
    background:#eab308; border:none; border-radius:6px;
    color:#000; font-size:16px; font-weight:700; letter-spacing:1px;
    cursor:pointer; transition:background 0.2s; -webkit-appearance:none;
  }
  .btn-main:hover { background:#ca8a04; }
  .links-row { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:20px; }
  .links-row a { color:rgba(255,255,255,0.45); font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; text-decoration:none; }
  .bottom-bar {
    background:#0a2218; border-top:1px solid rgba(255,255,255,0.08);
    padding:14px 28px; display:flex; justify-content:space-between; align-items:center;
  }
  .bottom-bar a { color:rgba(255,255,255,0.45); font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; text-decoration:none; }
  .error-msg {
    background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.35);
    color:#fca5a5; border-radius:6px; padding:10px 14px; font-size:13px;
    width:100%; max-width:400px; margin-bottom:12px; text-align:center;
  }
</style>
</head>
<body>
<div class="top-section">
  <div class="logo-wrap">
    <img src="https://media.base44.com/images/public/6a14ef767988d1ef0baff5aa/clean/shotgun_bank_main_logo_clean.png"
         class="logo-img" alt="Shotgun" onerror="this.style.display:none">
    <div class="logo-text">SHOTGUN BANK</div>
  </div>
  <div class="admin-badge">🔒 Admin Portal</div>
  <div class="greeting" id="greeting">Good Morning</div>

  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}

  <form method="POST" action="/admin/login" style="width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;">
    <div class="field-wrap">
      <input type="email" name="email" id="email" placeholder="Admin Email" autocomplete="username" required>
      <label for="email">Admin Email</label>
    </div>
    <div class="field-wrap">
      <input type="password" name="password" id="password" placeholder="Password" autocomplete="current-password" required>
      <label for="password">Password</label>
      <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
    </div>
    <button type="submit" class="btn-main">Sign In</button>
  </form>
  <div class="links-row">
    <a href="/">← Back to Shotgun Bank</a>
  </div>
</div>
<div class="bottom-bar">
  <a href="/">← User Portal</a>
  <a href="mailto:taximizerpro@gmail.com">📞 Support</a>
</div>
<script>
  const h = new Date().getHours();
  document.getElementById('greeting').textContent =
    h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';
  function togglePwd() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
