<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Shotgun Bank — Admin</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  
  :root {
    --bg:      #0a2218;
    --bg2:     #071a12;
    --card:    #0f2e1c;
    --border:  rgba(255,255,255,0.08);
    --green:   #16a34a;
    --green2:  #22c55e;
    --gold:    #eab308;
    --gold2:   #fbbf24;
    --text:    #ffffff;
    --muted:   rgba(255,255,255,0.45);
    --danger:  #ef4444;
  }

  body{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px;}
  .logo-img{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 8px 28px rgba(34,197,94,0.4));}
  .logo-tag{color:var(--gold);font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;}
  .admin-badge{background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.3);border-radius:20px;padding:4px 14px;color:var(--gold);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;}
  .card-title{color:var(--text);font-size:18px;font-weight:800;margin-bottom:6px;text-align:center;}
  .card-sub{color:var(--muted);font-size:12px;text-align:center;margin-bottom:24px;}
  .field{position:relative;margin-bottom:16px;}
  .field label{position:absolute;top:-9px;left:12px;background:var(--card);padding:0 4px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:0.4px;}
  .field input{width:100%;padding:15px 16px;background:transparent;border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;transition:border-color 0.2s;}
  .field input:focus{border-color:var(--green2);}
  .btn{width:100%;padding:16px;background:var(--gold);border:none;border-radius:10px;color:#000;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:0.5px;margin-top:8px;transition:background 0.2s;}
  .btn:hover{background:var(--gold2);}
  .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;text-align:center;margin-bottom:14px;}
  .back{display:block;text-align:center;margin-top:18px;color:var(--muted);font-size:12px;font-weight:600;text-decoration:none;letter-spacing:0.5px;}
  .back:hover{color:var(--text);}
</style>
</head>
<body>
  <div class="logo-wrap">
    <img src="https://base44.app/api/apps/6a14ef767988d1ef0baff5aa/files/mp/public/6a14ef767988d1ef0baff5aa/7a46af0fc_shotgun_bank_REAL_logo.png" class="logo-img" alt="Shotgun Bank" onerror="this.style.display='none'">
    <div class="logo-tag">Your Money, Reloaded</div>
  </div>
  <div class="admin-badge">⚡ Admin Portal</div>
  <div class="card">
    <div class="card-title">Admin Sign In</div>
    <div class="card-sub">Bisignano Holdings LLC — Authorized Personnel Only</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/admin/login">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Access Admin Panel</button>
    </form>
  </div>
  <a href="/" class="back">← Back to Shotgun Bank</a>
</body>
</html>
