<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shotgun Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
  html,body { height:100%; }
  body { display:flex; flex-direction:column; min-height:100vh; background:#0a2218; }

  .top-section {
    flex:1; background:#0a2218;
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start; padding:48px 28px 32px;
  }

  /* ── Logo ── */
  .logo-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:36px; }
  .logo-img { width:130px; height:130px; object-fit:contain; filter:drop-shadow(0 8px 28px rgba(34,197,94,0.5)); display:block; }
  .logo-text { color:#fff; font-size:21px; font-weight:800; letter-spacing:4px; text-transform:uppercase; }

  /* ── Tabs ── */
  .tab-row {
    display:flex; width:100%; max-width:400px;
    background:rgba(255,255,255,0.07); border-radius:8px; padding:4px; margin-bottom:28px;
  }
  .tab {
    flex:1; padding:11px; text-align:center; border-radius:6px;
    font-size:14px; font-weight:600; color:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.2s; letter-spacing:0.3px;
  }
  .tab.active { background:#16a34a; color:#fff; }

  /* ── Fields ── */
  .field-wrap { width:100%; max-width:400px; margin-bottom:14px; position:relative; }
  .field-wrap label {
    position:absolute; top:-9px; left:14px;
    background:#0a2218; padding:0 4px;
    color:rgba(255,255,255,0.55); font-size:12px; font-weight:500; letter-spacing:0.4px; pointer-events:none;
  }
  .field-wrap input {
    width:100%; padding:16px 48px 16px 16px; background:transparent;
    border:1.5px solid rgba(255,255,255,0.25); border-radius:8px;
    color:#fff; font-size:16px; outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .field-wrap input::placeholder { color:transparent; }
  .field-wrap input:focus { border-color:#22c55e; }
  .eye-btn {
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.5); font-size:18px; padding:4px;
  }

  /* ── Button ── */
  .btn-main {
    width:100%; max-width:400px; padding:17px; margin-top:8px;
    background:#16a34a; border:none; border-radius:8px;
    color:#fff; font-size:16px; font-weight:700; letter-spacing:1px;
    cursor:pointer; transition:background 0.2s; -webkit-appearance:none;
  }
  .btn-main:hover { background:#15803d; }
  .btn-main:active { background:#166534; }

  /* ── Links ── */
  .links-row { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:20px; }
  .links-row a { color:rgba(255,255,255,0.45); font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; text-decoration:none; }
  .links-row a:hover { color:rgba(255,255,255,0.85); }

  /* ── Bottom bar ── */
  .bottom-bar {
    background:#071a12; border-top:1px solid rgba(255,255,255,0.08);
    padding:14px 28px; display:flex; justify-content:space-between; align-items:center;
  }
  .bottom-bar a { color:rgba(255,255,255,0.45); font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; text-decoration:none; display:flex; align-items:center; gap:6px; }
  .bottom-bar a:hover { color:#fff; }

  /* ── Alerts ── */
  .error-msg { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.35); color:#fca5a5; border-radius:8px; padding:10px 14px; font-size:13px; width:100%; max-width:400px; margin-bottom:14px; text-align:center; }

  /* ── Signup extras ── */
  .hashtag-status { font-size:11px; margin-top:4px; padding-left:4px; min-height:16px; }
  .hashtag-ok { color:#4ade80; }
  .hashtag-taken { color:#f87171; }

  /* SECTIONS — login visible by default, signup hidden */
  #loginSection  { width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; }
  #signupSection { width:100%; max-width:400px; display:none;  flex-direction:column; align-items:center; }
</style>
</head>
<body>
<div class="top-section">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="https://base44.app/api/apps/6a14ef767988d1ef0baff5aa/files/mp/public/6a14ef767988d1ef0baff5aa/7a46af0fc_shotgun_bank_REAL_logo.png" class="logo-img" alt="Shotgun Bank"
         onerror="this.style.display='none'">
    <div class="logo-text">SHOTGUN BANK</div>
  </div>

  <!-- TABS -->
  <div class="tab-row">
    <div class="tab active" id="tabLogin"  onclick="switchTab('login')">Sign In</div>
    <div class="tab"        id="tabSignup" onclick="switchTab('signup')">Create Account</div>
  </div>

  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}

  <!-- LOGIN SECTION (shown by default) -->
  <div id="loginSection">
    <form method="POST" action="/login" style="width:100%">
      <div class="field-wrap">
        <input type="text" name="hashtag" id="loginHashtag" placeholder="$Hashtag or Email" autocomplete="username" required>
        <label for="loginHashtag">$Hashtag or Email</label>
      </div>
      <div class="field-wrap">
        <input type="password" name="pin" id="loginPin" placeholder="PIN" autocomplete="current-password" inputmode="numeric" maxlength="6" required>
        <label for="loginPin">PIN</label>
        <button type="button" class="eye-btn" onclick="toggleField('loginPin',this)">👁</button>
      </div>
      <button type="submit" class="btn-main">Sign In</button>
    </form>
    <div class="links-row">
      <a href="#" onclick="switchTab('signup');return false;">Don't have an account? Create one</a>
      <a href="/forgot-pin">Forgot PIN?</a>
    </div>
  </div>

  <!-- SIGNUP SECTION (hidden until tab clicked) -->
  <div id="signupSection">
    <form method="POST" action="/signup" style="width:100%">
      <div class="field-wrap">
        <input type="text" name="first_name" placeholder="First Name" required>
        <label>First Name</label>
      </div>
      <div class="field-wrap">
        <input type="text" name="last_name" placeholder="Last Name" required>
        <label>Last Name</label>
      </div>
      <div class="field-wrap">
        <input type="email" name="email" placeholder="Email" required>
        <label>Email</label>
      </div>
      <div class="field-wrap">
        <input type="text" name="hashtag" id="signupHashtag" placeholder="$Hashtag (e.g. $ITALY)" required oninput="checkHashtag(this.value)">
        <label for="signupHashtag">Your $Hashtag</label>
        <div class="hashtag-status" id="hashtagStatus"></div>
      </div>
      <div class="field-wrap">
        <input type="password" name="pin" id="signupPin" placeholder="Choose a 6-digit PIN" inputmode="numeric" maxlength="6" required>
        <label for="signupPin">6-Digit PIN</label>
        <button type="button" class="eye-btn" onclick="toggleField('signupPin',this)">👁</button>
      </div>
      <button type="submit" class="btn-main">Create Account</button>
    </form>
    <div class="links-row">
      <a href="#" onclick="switchTab('login');return false;">Already have an account? Sign In</a>
    </div>
  </div>

</div><!-- /top-section -->

<div class="bottom-bar">
  <a href="mailto:support@shotgunbank.com">SUPPORT</a>
  <a href="/admin/login">ADMIN</a>
</div>

<script>
  // Time-based greeting (optional — remove if not needed)
  // const h = new Date().getHours();
  // document.getElementById('greeting').textContent =
  //   h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginSection').style.display  = isLogin ? 'flex' : 'none';
    document.getElementById('signupSection').style.display = isLogin ? 'none'  : 'flex';
    document.getElementById('tabLogin').classList.toggle('active',  isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  }

  function toggleField(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  let hashtagTimer;
  function checkHashtag(val) {
    const el = document.getElementById('hashtagStatus');
    clearTimeout(hashtagTimer);
    if (!val || val.length < 2) { el.textContent = ''; return; }
    hashtagTimer = setTimeout(async () => {
      try {
        const tag = val.startsWith('$') ? val : '$' + val;
        const res = await fetch('/check-tag?tag=' + encodeURIComponent(tag));
        const d   = await res.json();
        el.className = 'hashtag-status ' + (d.available ? 'hashtag-ok' : 'hashtag-taken');
        el.textContent = d.available ? '✓ ' + tag + ' is available' : '✗ ' + tag + ' is taken';
      } catch(e) { el.textContent = ''; }
    }, 500);
  }
</script>
</body>
</html>
