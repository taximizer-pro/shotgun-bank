<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shotgun Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f8fafc;color:#0f172a;font-family:'Inter',sans-serif;}
.hdr{background:#0f172a;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{display:flex;align-items:center;gap:10px;color:#f1f5f9;}
.hdr-logo-ico{width:36px;height:36px;background:linear-gradient(135deg,#e94560,#c0392b);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.hdr-name{font-size:16px;font-weight:900;color:#f1f5f9;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.client-link{background:#e94560;color:#fff;text-decoration:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;}
.logout-link{color:#94a3b8;text-decoration:none;font-size:12px;}
.main{max-width:1000px;margin:0 auto;padding:28px;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px;text-align:center;}
.stat-val{font-size:26px;font-weight:900;margin-bottom:4px;}
.stat-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;}
.tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;color:#64748b;}
.tab.on{background:#0f172a;color:#fff;border-color:#0f172a;}
.panel{display:none;} .panel.on{display:block;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;}
.card-hdr{padding:14px 20px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:800;}
.card-body{padding:16px;}
.mrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f8fafc;}
.mrow:last-child{border-bottom:none;}
.av{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#e94560,#c0392b);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;}
.minfo{flex:1;}
.mname{font-size:13px;font-weight:800;}
.mtag{font-size:11px;color:#e94560;font-weight:700;}
.memail{font-size:11px;color:#64748b;}
.mright{text-align:right;}
.mbal{font-size:14px;font-weight:900;}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.bp{background:#fef3c7;color:#92400e;}
.ba{background:#dcfce7;color:#166534;}
.bd{background:#fee2e2;color:#991b1b;}
.bo{background:#dbeafe;color:#1e40af;}
.arow{display:flex;gap:6px;margin-top:6px;}
.abtn{border:none;border-radius:7px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;}
.app{background:#22c55e;color:#fff;}
.aden{background:#ef4444;color:#fff;}
.aghst{background:#7c3aed;color:#fff;}
.search{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;margin-bottom:14px;outline:none;font-family:inherit;}
.tx-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f8fafc;}
.tx-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:#f1f5f9;flex-shrink:0;}
.tx-info{flex:1;}
.tx-name{font-size:12px;font-weight:700;}
.tx-note{font-size:11px;color:#94a3b8;}
.tx-amt{font-size:13px;font-weight:800;text-align:right;}
.tx-amt.cr{color:#22c55e;} .tx-amt.db{color:#ef4444;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-logo-ico">🔫</div>
    <div>
      <div class="hdr-name">Shotgun Bank — Admin</div>
      <div style="font-size:11px;color:#475569;">Bisignano Holdings LLC</div>
    </div>
  </div>
  <div class="hdr-right">
    <a href="/" target="_blank" class="client-link">Open Client App ↗</a>
    <a href="/admin/logout" class="logout-link">Sign Out</a>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-val" id="st-pending" style="color:#f59e0b;">—</div><div class="stat-lbl">Pending</div></div>
    <div class="stat"><div class="stat-val" id="st-onboard" style="color:#3b82f6;">—</div><div class="stat-lbl">Onboarding</div></div>
    <div class="stat"><div class="stat-val" id="st-approved" style="color:#22c55e;">—</div><div class="stat-lbl">Approved</div></div>
    <div class="stat"><div class="stat-val" id="st-total" style="color:#0f172a;">—</div><div class="stat-lbl">Total Members</div></div>
    <div class="stat"><div class="stat-val" id="st-fees" style="color:#e94560;">—</div><div class="stat-lbl">Fee Revenue</div></div>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="tab(this,'pending')">⏳ Pending</div>
    <div class="tab" onclick="tab(this,'all')">👥 All Members</div>
    <div class="tab" onclick="tab(this,'tx')">💸 Transactions</div>
  </div>

  <div class="panel on" id="p-pending">
    <div class="card">
      <div class="card-hdr">Pending Applications <button onclick="load()" style="background:#f1f5f9;border:none;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;">Refresh</button></div>
      <div class="card-body" id="pending-list"><div style="text-align:center;padding:30px;color:#94a3b8;">Loading…</div></div>
    </div>
  </div>

  <div class="panel" id="p-all">
    <input class="search" placeholder="Search name, email, #hashtag…" oninput="filterMembers(this.value)">
    <div class="card"><div class="card-body" id="member-list"><div style="text-align:center;padding:30px;color:#94a3b8;">Loading…</div></div></div>
  </div>

  <div class="panel" id="p-tx">
    <div class="card"><div class="card-body" id="tx-list"><div style="text-align:center;padding:30px;color:#94a3b8;">Loading…</div></div></div>
  </div>
</div>

<script>
let allMembers=[];

function tab(el,name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+name).classList.add('on');
  if(name==='tx') loadTx();
}

async function load(){
  try{
    const [pr,mr]=await Promise.all([
      fetch('/api/admin/pending').then(r=>r.json()),
      fetch('/api/admin/all').then(r=>r.json())
    ]);
    renderPending(pr.accounts||[]);
    allMembers=mr.accounts||[];
    renderMembers(allMembers);
    updateStats(allMembers);
  }catch(e){console.error(e);}
}

function updateStats(m){
  document.getElementById('st-pending').textContent=m.filter(x=>x.status==='pending').length;
  document.getElementById('st-onboard').textContent=m.filter(x=>x.status==='onboarding').length;
  document.getElementById('st-approved').textContent=m.filter(x=>x.status==='approved').length;
  document.getElementById('st-total').textContent=m.length;
  // Fee revenue — rough calc from total tx
  document.getElementById('st-fees').textContent='—';
}

function renderPending(accts){
  const el=document.getElementById('pending-list');
  if(!accts.length){el.innerHTML='<div style="text-align:center;padding:28px;color:#94a3b8;">No pending applications 🎉</div>';return;}
  el.innerHTML=accts.map(a=>`
    <div class="mrow" id="row-${a.id}">
      <div class="av">${(a.first_name||'?')[0]}${(a.last_name||'?')[0]}</div>
      <div class="minfo">
        <div class="mname">${a.first_name} ${a.last_name}</div>
        <div class="mtag">#${a.hashtag}</div>
        <div class="memail">${a.email} · ${a.phone||'—'}</div>
        <div class="arow">
          <button class="abtn app" onclick="approve('${a.id}')">✓ Approve</button>
          <button class="abtn aden" onclick="deny('${a.id}')">✗ Deny</button>
        </div>
      </div>
      <span class="badge bp">Pending</span>
    </div>`).join('');
}

function renderMembers(m){
  const el=document.getElementById('member-list');
  if(!m.length){el.innerHTML='<div style="text-align:center;padding:28px;color:#94a3b8;">No members yet</div>';return;}
  el.innerHTML=m.map(a=>{
    const bal=parseFloat(a.balance||0);
    const bc=a.status==='approved'?'ba':a.status==='denied'?'bd':a.status==='onboarding'?'bo':'bp';
    return `<div class="mrow">
      <div class="av">${(a.first_name||'?')[0]}${(a.last_name||'?')[0]}</div>
      <div class="minfo">
        <div class="mname">${a.first_name} ${a.last_name}</div>
        <div class="mtag">#${a.hashtag}</div>
        <div class="memail">${a.email}</div>
      </div>
      <div class="mright">
        <span class="badge ${bc}">${a.status}</span>
        <div class="mbal" style="color:${bal<0?'#ef4444':'#0f172a'}">${bal<0?'-':''}$${Math.abs(bal).toFixed(2)}</div>
        ${a.status==='approved'?`<div class="arow" style="justify-content:flex-end;"><button class="abtn aghst" onclick="ghost('${a.id}')">👻 Ghost</button></div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function loadTx(){
  try{
    const r=await fetch('/api/admin/transactions');
    const d=await r.json();
    const el=document.getElementById('tx-list');
    const txs=d.transactions||[];
    if(!txs.length){el.innerHTML='<div style="text-align:center;padding:28px;color:#94a3b8;">No transactions yet</div>';return;}
    el.innerHTML=txs.map(tx=>{
      const isIncome=['deposit','incoming'].includes(tx.type);
      const ico=tx.status==='completed'?(isIncome?'🎯':'💸'):'💀';
      const amt=parseFloat(tx.amount||0);
      const fee=parseFloat(tx.fee||0);
      const date=new Date(tx.created_date||Date.now()).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<div class="tx-row">
        <div class="tx-ico">${ico}</div>
        <div class="tx-info">
          <div class="tx-name">${tx.from_name||'#'+tx.from_hashtag||'—'} → ${tx.to_name||'#'+tx.to_hashtag||'—'}</div>
          <div class="tx-note">${tx.type||''} · ${tx.note||''} · ${date}</div>
        </div>
        <div>
          <div class="tx-amt ${isIncome?'cr':'db'}">${isIncome?'+':'-'}$${amt.toFixed(2)}</div>
          <div style="font-size:10px;color:#94a3b8;text-align:right;">Fee: $${fee.toFixed(2)}</div>
        </div>
      </div>`;
    }).join('');
  }catch(e){console.error(e);}
}

function filterMembers(q){
  q=q.toLowerCase();
  renderMembers(allMembers.filter(m=>(m.first_name+' '+m.last_name).toLowerCase().includes(q)||(m.email||'').toLowerCase().includes(q)||(m.hashtag||'').toLowerCase().includes(q)));
}

async function approve(id){
  if(!confirm('Approve this account?'))return;
  const r=await fetch('/api/admin/approve/'+id,{method:'POST'});
  const d=await r.json();
  if(d.success){document.getElementById('row-'+id)?.remove();load();}
  else alert(d.error||'Error');
}
async function deny(id){
  const reason=prompt('Reason (optional):')||'';
  const r=await fetch('/api/admin/deny/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason})});
  const d=await r.json();
  if(d.success){document.getElementById('row-'+id)?.remove();load();}
  else alert(d.error||'Error');
}
function ghost(id){window.open('/admin/ghost/'+id,'_blank');}

load();
</script>
</body>
</html>
