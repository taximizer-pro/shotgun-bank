<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design Your Shotgun Card</title>
<style>
:root{--bg:#0a2218;--card:#0f2e1e;--border:#1a4a2e;--green:#16a34a;--gold:#eab308;--text:#f0fdf4;--muted:#6b7280;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:0 0 60px;}
.topbar{background:var(--card);border-bottom:2px solid var(--gold);padding:12px 24px;display:flex;align-items:center;gap:16px;}
.topbar img{height:38px;}
.topbar h1{font-size:18px;color:var(--gold);font-weight:800;}
.topbar .back{margin-left:auto;color:var(--muted);text-decoration:none;font-size:13px;}
.wrap{max-width:900px;margin:32px auto;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:32px;}
@media(max-width:640px){.wrap{grid-template-columns:1fr;}}

/* CARD PREVIEW */
.preview-section h2{font-size:15px;color:var(--gold);margin-bottom:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.card-preview{
  width:100%;aspect-ratio:1.586;border-radius:18px;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.7);cursor:default;
  background:#0a2218;
}
.card-bg-layer{position:absolute;inset:0;z-index:0;}
.card-pattern-layer{position:absolute;inset:0;z-index:1;opacity:.15;}
.card-content{position:absolute;inset:0;z-index:3;padding:20px 24px;display:flex;flex-direction:column;justify-content:space-between;}
.card-chip{width:38px;height:28px;background:linear-gradient(135deg,#eab308,#d97706);border-radius:5px;opacity:.9;}
.card-logo{width:90px;opacity:.95;}
.card-number{font-size:15px;font-weight:700;letter-spacing:2.5px;font-family:monospace;}
.card-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
.card-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.card-exp{font-size:11px;opacity:.8;}
.card-cvv-label{font-size:9px;opacity:.6;text-transform:uppercase;}
.shotgun-watermark{
  position:absolute;right:-20px;bottom:-20px;z-index:2;
  width:120px;opacity:.12;pointer-events:none;
}

/* CONTROLS */
.controls h2{font-size:15px;color:var(--gold);margin-bottom:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ctrl-group{margin-bottom:18px;}
.ctrl-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;font-weight:600;}
.color-row{display:flex;gap:10px;flex-wrap:wrap;}
.color-swatch{
  width:36px;height:36px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:.2s;
}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}
.color-swatch.custom{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);position:relative;}
#customColorInput{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;}
.pattern-row{display:flex;gap:10px;flex-wrap:wrap;}
.pattern-btn{
  padding:8px 14px;border-radius:8px;border:2px solid var(--border);
  background:var(--card);color:var(--muted);font-size:12px;cursor:pointer;transition:.2s;font-weight:600;
}
.pattern-btn.selected{border-color:var(--green);color:var(--text);background:#0d2820;}
.text-color-row{display:flex;gap:10px;flex-wrap:wrap;}
.tc-swatch{width:32px;height:32px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.tc-swatch.selected{border-color:#fff;transform:scale(1.1);}
.upload-area{
  border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;
  color:var(--muted);font-size:13px;cursor:pointer;transition:.2s;
}
.upload-area:hover{border-color:var(--green);color:var(--text);}
#bgUpload{display:none;}
.save-btn{
  width:100%;padding:14px;background:var(--green);color:#fff;border:none;
  border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;
  transition:.2s;letter-spacing:.5px;
}
.save-btn:hover{background:#15803d;}
.reset-btn{
  width:100%;padding:10px;background:transparent;color:var(--muted);border:1px solid var(--border);
  border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px;
}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a3a2a;border:1px solid var(--green);border-radius:10px;padding:12px 28px;color:var(--text);font-weight:700;font-size:14px;display:none;z-index:999;}
.toast.show{display:block;}
</style>
</head>
<body>
<div class="topbar">
  <img src="https://base44.app/api/apps/6a14ef767988d1ef0baff5aa/files/mp/public/6a14ef767988d1ef0baff5aa/7a46af0fc_shotgun_bank_REAL_logo.png" alt="Shotgun Bank" onerror="this.style.display='none'">
  <h1>🎨 Design Your Card</h1>
  <a class="back" href="/dashboard">← Back to Dashboard</a>
</div>

<div class="wrap">
  <!-- PREVIEW -->
  <div class="preview-section">
    <h2>Live Preview</h2>
    <div class="card-preview" id="cardPreview">
      <div class="card-bg-layer" id="cardBg"></div>
      <canvas class="card-pattern-layer" id="patternCanvas"></canvas>
      <img class="shotgun-watermark" src="https://base44.app/api/apps/6a14ef767988d1ef0baff5aa/files/mp/public/6a14ef767988d1ef0baff5aa/7a46af0fc_shotgun_bank_REAL_logo.png" id="cardWatermark" onerror="this.style.display='none'">
      <div class="card-content" id="cardContent">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div class="card-chip"></div>
          <img class="card-logo" src="https://base44.app/api/apps/6a14ef767988d1ef0baff5aa/files/mp/public/6a14ef767988d1ef0baff5aa/7a46af0fc_shotgun_bank_REAL_logo.png" alt="Shotgun" onerror="this.style.display='none'">
        </div>
        <div>
          <div class="card-number" id="previewNum">•••• •••• •••• 3107</div>
          <div class="card-bottom" style="margin-top:8px;">
            <div>
              <div class="card-name" id="previewName">YOUR NAME</div>
              <div style="display:flex;gap:16px;margin-top:4px;">
                <div><div class="card-cvv-label">VALID THRU</div><div class="card-exp" id="previewExp">12/28</div></div>
              </div>
            </div>
            <div style="font-size:24px;opacity:.7">💳</div>
          </div>
        </div>
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:12px;text-align:center;">
      🔒 Shotgun Bank logo always appears on your card
    </p>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <h2>Customize</h2>

    <div class="ctrl-group">
      <label>Card Background Color</label>
      <div class="color-row" id="bgColorRow">
        <div class="color-swatch selected" style="background:#0a2218" data-color="#0a2218" onclick="setBg(this)"></div>
        <div class="color-swatch" style="background:#0d2b5e" data-color="#0d2b5e" onclick="setBg(this)"></div>
        <div class="color-swatch" style="background:#1a1a1a" data-color="#1a1a1a" onclick="setBg(this)"></div>
        <div class="color-swatch" style="background:#450a0a" data-color="#450a0a" onclick="setBg(this)"></div>
        <div class="color-swatch" style="background:#312e81" data-color="#312e81" onclick="setBg(this)"></div>
        <div class="color-swatch" style="background:#7c2d12" data-color="#7c2d12" onclick="setBg(this)"></div>
        <div class="color-swatch" style="background:#134e4a" data-color="#134e4a" onclick="setBg(this)"></div>
        <div class="color-swatch custom" title="Custom color">
          <input type="color" id="customColorInput" onchange="setBgCustom(this.value)">
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <label>Text Color</label>
      <div class="text-color-row" id="tcRow">
        <div class="tc-swatch selected" style="background:#eab308" data-tc="#eab308" onclick="setTc(this)"></div>
        <div class="tc-swatch" style="background:#ffffff" data-tc="#ffffff" onclick="setTc(this)"></div>
        <div class="tc-swatch" style="background:#4ade80" data-tc="#4ade80" onclick="setTc(this)"></div>
        <div class="tc-swatch" style="background:#f87171" data-tc="#f87171" onclick="setTc(this)"></div>
        <div class="tc-swatch" style="background:#60a5fa" data-tc="#60a5fa" onclick="setTc(this)"></div>
      </div>
    </div>

    <div class="ctrl-group">
      <label>Background Pattern</label>
      <div class="pattern-row">
        <div class="pattern-btn selected" data-pattern="none" onclick="setPattern(this)">None</div>
        <div class="pattern-btn" data-pattern="dots" onclick="setPattern(this)">• Dots</div>
        <div class="pattern-btn" data-pattern="lines" onclick="setPattern(this)">≡ Lines</div>
        <div class="pattern-btn" data-pattern="grid" onclick="setPattern(this)">⊞ Grid</div>
        <div class="pattern-btn" data-pattern="diamonds" onclick="setPattern(this)">◆ Diamonds</div>
      </div>
    </div>

    <div class="ctrl-group">
      <label>Custom Background Image (optional)</label>
      <div class="upload-area" onclick="document.getElementById('bgUpload').click()">
        📷 Tap to upload a photo or image<br>
        <span id="uploadName" style="font-size:11px;margin-top:4px;display:block;color:var(--green)"></span>
      </div>
      <input type="file" id="bgUpload" accept="image/*" onchange="handleBgUpload(this)">
      <button class="reset-btn" onclick="clearBgImage()" style="margin-top:8px">✕ Remove Image</button>
    </div>

    <button class="save-btn" onclick="saveDesign()">💾 Save My Card Design</button>
    <button class="reset-btn" onclick="resetDesign()">↺ Reset to Default</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LOGO = "https://base44.app/api/apps/6a14ef767988d1ef0baff5aa/files/mp/public/6a14ef767988d1ef0baff5aa/7a46af0fc_shotgun_bank_REAL_logo.png";
let design = {
  bg_color: "#0a2218",
  text_color: "#eab308",
  pattern: "none",
  bg_image: "",
};

// ── CARD DATA (injected from session or defaults) ──
const cardData = {
  number: "•••• •••• •••• 3107",
  name:   "YOUR NAME",
  exp:    "12/28",
};

function applyDesign(){
  const bg = document.getElementById("cardBg");
  const content = document.getElementById("cardContent");

  if(design.bg_image){
    bg.style.background = `url(${design.bg_image}) center/cover no-repeat`;
  } else {
    bg.style.background = design.bg_color;
  }

  // Text color
  content.querySelectorAll(".card-number,.card-name,.card-exp,.card-cvv-label").forEach(el=>{
    el.style.color = design.text_color;
  });

  drawPattern();
}

function drawPattern(){
  const canvas = document.getElementById("patternCanvas");
  const card = document.getElementById("cardPreview");
  canvas.width = card.offsetWidth;
  canvas.height = card.offsetHeight;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = design.text_color;
  ctx.lineWidth = 1;

  const w=canvas.width, h=canvas.height;
  if(design.pattern==="dots"){
    ctx.fillStyle = design.text_color;
    for(let x=10;x<w;x+=18){for(let y=10;y<h;y+=18){
      ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();
    }}
  } else if(design.pattern==="lines"){
    for(let y=0;y<h+w;y+=20){
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(y,0);ctx.stroke();
    }
  } else if(design.pattern==="grid"){
    for(let x=0;x<w;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
    for(let y=0;y<h;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  } else if(design.pattern==="diamonds"){
    const s=30;
    for(let x=-s;x<w+s;x+=s){for(let y=-s;y<h+s;y+=s){
      ctx.beginPath();ctx.moveTo(x,y-s/2);ctx.lineTo(x+s/2,y);ctx.lineTo(x,y+s/2);ctx.lineTo(x-s/2,y);ctx.closePath();ctx.stroke();
    }}
  }
}

function setBg(el){
  document.querySelectorAll(".color-swatch").forEach(e=>e.classList.remove("selected"));
  el.classList.add("selected");
  design.bg_color = el.dataset.color;
  design.bg_image = "";
  document.getElementById("uploadName").textContent="";
  applyDesign();
}

function setBgCustom(color){
  design.bg_color = color;
  design.bg_image = "";
  applyDesign();
}

function setTc(el){
  document.querySelectorAll(".tc-swatch").forEach(e=>e.classList.remove("selected"));
  el.classList.add("selected");
  design.text_color = el.dataset.tc;
  applyDesign();
}

function setPattern(el){
  document.querySelectorAll(".pattern-btn").forEach(e=>e.classList.remove("selected"));
  el.classList.add("selected");
  design.pattern = el.dataset.pattern;
  applyDesign();
}

function handleBgUpload(input){
  const file = input.files[0];
  if(!file) return;
  document.getElementById("uploadName").textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => { design.bg_image = e.target.result; applyDesign(); };
  reader.readAsDataURL(file);
}

function clearBgImage(){
  design.bg_image="";
  document.getElementById("uploadName").textContent="";
  applyDesign();
}

function resetDesign(){
  design={bg_color:"#0a2218",text_color:"#eab308",pattern:"none",bg_image:""};
  document.querySelectorAll(".color-swatch")[0].classList.add("selected");
  document.querySelectorAll(".tc-swatch")[0].classList.add("selected");
  document.querySelectorAll(".pattern-btn")[0].classList.add("selected");
  applyDesign();
  showToast("↺ Reset to default");
}

async function saveDesign(){
  const payload = {
    bg_color:   design.bg_color,
    text_color: design.text_color,
    pattern:    design.pattern,
    bg_image:   design.bg_image.length > 500000 ? "" : design.bg_image, // skip huge images
  };
  try {
    const r = await fetch("/api/card/design", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if(d.success) showToast("🎯 Card design saved!");
    else showToast("❌ "+d.error, true);
  } catch(e){ showToast("❌ Error saving", true); }
}

async function loadExisting(){
  try{
    const r = await fetch("/api/card/design");
    const d = await r.json();
    if(d.bg_color) design.bg_color = d.bg_color;
    if(d.text_color) design.text_color = d.text_color;
    if(d.pattern) design.pattern = d.pattern;
    if(d.bg_image) design.bg_image = d.bg_image;
    applyDesign();
  }catch(e){}
}

function showToast(msg, err=false){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.borderColor=err?"#dc2626":"var(--green)";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// Init
window.addEventListener("resize", drawPattern);
loadExisting();
applyDesign();
</script>
</body>
</html>
